version: '3.8'

services:
  # LocalStack for local AWS service emulation
  localstack:
    image: localstack/localstack:latest
    container_name: cloudforge-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=dynamodb,s3,lambda,ecs,cloudwatch,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack-data:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - cloudforge-network

  # Backend API (optional - can run locally instead)
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: cloudforge-backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - AWS_ENDPOINT_URL=http://localstack:4566
  #     - ENVIRONMENT=local
  #   env_file:
  #     - ./backend/.env
  #   depends_on:
  #     - localstack
  #   networks:
  #     - cloudforge-network

  # Dashboard (optional - can run locally instead)
  # dashboard:
  #   build:
  #     context: ./dashboard
  #     dockerfile: Dockerfile
  #   container_name: cloudforge-dashboard
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - VITE_API_URL=http://localhost:8000
  #   networks:
  #     - cloudforge-network

networks:
  cloudforge-network:
    driver: bridge

volumes:
  localstack-data:
