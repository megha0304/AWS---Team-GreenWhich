{% extends "base.html" %}

{% block title %}Workflows - CloudForge{% endblock %}

{% block content %}
<div class="workflows-page">
    <h2>Workflows</h2>
    
    <div class="filters">
        <select id="status-filter" class="filter-select">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
        </select>
        
        <select id="severity-filter" class="filter-select">
            <option value="">All Severities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>
        
        <button id="refresh-btn" class="btn btn-secondary">🔄 Refresh</button>
    </div>

    <div id="workflows-container" class="workflows-grid">
        <p class="loading">Loading workflows...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadWorkflows() {
    const statusFilter = document.getElementById('status-filter').value;
    const severityFilter = document.getElementById('severity-filter').value;
    
    const params = new URLSearchParams();
    if (statusFilter) params.append('status', statusFilter);
    if (severityFilter) params.append('severity', severityFilter);
    
    try {
        const response = await fetch(`/api/workflows?${params}`);
        const data = await response.json();
        
        displayWorkflows(data.workflows);
    } catch (error) {
        console.error('Error loading workflows:', error);
        document.getElementById('workflows-container').innerHTML = 
            '<p class="error">Error loading workflows. Please try again.</p>';
    }
}

function displayWorkflows(workflows) {
    const container = document.getElementById('workflows-container');
    
    if (workflows.length === 0) {
        container.innerHTML = '<p class="empty">No workflows found.</p>';
        return;
    }
    
    container.innerHTML = workflows.map(workflow => `
        <div class="workflow-card">
            <div class="workflow-header">
                <h3>${workflow.repository_url}</h3>
                <span class="badge badge-${workflow.status}">${workflow.status}</span>
            </div>
            <div class="workflow-body">
                <p><strong>ID:</strong> ${workflow.workflow_id}</p>
                <p><strong>Current Agent:</strong> ${workflow.current_agent}</p>
                <p><strong>Created:</strong> ${new Date(workflow.created_at).toLocaleString()}</p>
                <div class="workflow-stats">
                    <span>🐛 ${workflow.bugs_found} bugs</span>
                    <span>🧪 ${workflow.tests_generated} tests</span>
                </div>
            </div>
            <div class="workflow-footer">
                <a href="/workflows/${workflow.workflow_id}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    `).join('');
}

// Event listeners
document.getElementById('status-filter').addEventListener('change', loadWorkflows);
document.getElementById('severity-filter').addEventListener('change', loadWorkflows);
document.getElementById('refresh-btn').addEventListener('click', loadWorkflows);

// Initial load
loadWorkflows();

// Auto-refresh every 10 seconds
setInterval(loadWorkflows, 10000);
</script>
{% endblock %}
