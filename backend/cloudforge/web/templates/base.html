<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CloudForge Bug Intelligence{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js for pie charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🐛 CloudForge Bug Intelligence</h1>
            <nav class="nav">
                <a href="/" class="nav-link {% if request.path == '/' %}nav-link-active{% endif %}">Home</a>
                <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}nav-link-active{% endif %}">Dashboard</a>
                <a href="/workflows" class="nav-link {% if request.path == '/workflows' %}nav-link-active{% endif %}">Workflows</a>
                <a href="/chatbot" class="nav-link {% if request.path == '/chatbot' %}nav-link-active{% endif %}">🤖 Chatbot</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 CloudForge - Powered by Team GreenWhich</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
